<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
        <meta http-equiv="Pragma" content="no-cache" />
        <meta http-equiv="Expires" content="0" />
        <meta name="application-name" content="窝窝饮食好店指南" />
        <meta name="apple-mobile-web-app-title" content="窝窝饮食好店指南" />
        <meta name="description" content="窝窝青年旅舍附近 47 家核准餐馆筛选、留言、投票和高德定位指南。" />
        <meta property="og:title" content="窝窝饮食好店指南" />
        <meta property="og:description" content="从窝窝出发，按骑行距离、饭点和心情筛选附近好店。" />
        <link rel="icon" href="/demo/html/favicon.ico" />
        <link rel="preload" as="image" href="/assets/nanchang-flat-start-mobile-DO-pWQP7.jpg" />
        <style>
            html,
            body,
            #root {
                min-height: 100%;
            }

            body {
                margin: 0;
                background: #fbf4e8;
            }

            #root:empty::before {
                content: '正在打开窝窝吃饭小助手...';
                display: flex;
                min-height: 100vh;
                align-items: center;
                justify-content: center;
                color: #725d42;
                font:
                    700 16px -apple-system,
                    BlinkMacSystemFont,
                    'PingFang SC',
                    'Microsoft YaHei',
                    sans-serif;
            }

            #app-root {
                min-height: 100vh;
                min-height: 100svh;
            }

            body:not(.wowo-app-entered) #app-root {
                display: none;
            }

            body.wowo-app-entered #root {
                display: none;
            }

            .wowo-static-intro {
                display: flex;
                min-height: 100vh;
                min-height: 100svh;
                align-items: center;
                justify-content: center;
                padding: 18px 14px;
                box-sizing: border-box;
                background: linear-gradient(180deg, rgba(255, 250, 239, 0.9), rgba(246, 232, 202, 0.9)), #f8edcf;
            }

            .wowo-static-stage {
                position: relative;
                width: 362px;
                max-width: calc(100vw - 28px);
                height: 746px;
                height: calc(100vh - 36px);
                max-height: 746px;
                overflow: hidden;
                border-radius: 28px;
                background: #efc55b url('/assets/nanchang-flat-start-mobile-DO-pWQP7.jpg') center / contain no-repeat;
                box-shadow:
                    0 24px 54px rgba(116, 84, 34, 0.18),
                    0 0 0 1px rgba(112, 78, 34, 0.1);
            }

            .wowo-static-stage img {
                display: block;
                width: 100%;
                height: 100%;
                object-fit: contain;
                object-position: center;
            }

            .wowo-static-title {
                position: absolute;
                left: 24px;
                right: 24px;
                bottom: 104px;
                display: grid;
                gap: 7px;
                justify-items: center;
                padding: 16px 14px 17px;
                border-radius: 22px;
                background: rgba(255, 249, 231, 0.88);
                color: #4b3926;
                text-align: center;
                box-shadow: 0 12px 28px rgba(112, 78, 34, 0.12);
            }

            .wowo-static-title span {
                color: #7a6141;
                font:
                    900 13px/1.2 -apple-system,
                    BlinkMacSystemFont,
                    'PingFang SC',
                    'Microsoft YaHei',
                    sans-serif;
            }

            .wowo-static-title strong {
                font:
                    900 28px/1.05 -apple-system,
                    BlinkMacSystemFont,
                    'PingFang SC',
                    'Microsoft YaHei',
                    sans-serif;
            }

            .wowo-static-action {
                position: absolute;
                left: 50%;
                bottom: 34px;
                width: 230px;
                max-width: calc(100% - 58px);
                min-height: 48px;
                transform: translateX(-50%);
                border: 0;
                border-radius: 24px;
                background: #fffaf1;
                color: #7a4b2c;
                font:
                    900 16px/1 -apple-system,
                    BlinkMacSystemFont,
                    'PingFang SC',
                    'Microsoft YaHei',
                    sans-serif;
            }

            .wowo-static-error {
                padding: 22px;
                color: #5b412a;
                font:
                    800 18px/1.6 -apple-system,
                    BlinkMacSystemFont,
                    'PingFang SC',
                    'Microsoft YaHei',
                    sans-serif;
                text-align: center;
            }
        </style>
        <title>窝窝饮食好店指南</title>
    </head>

    <body>
        <div id="root">
            <section class="wowo-static-intro" data-wowo-static-intro>
                <div class="wowo-static-stage">
                    <img
                        src="/assets/nanchang-flat-start-mobile-DO-pWQP7.jpg"
                        width="941"
                        height="1672"
                        alt=""
                        decoding="sync"
                        fetchpriority="high"
                    />
                    <div class="wowo-static-title">
                        <span>窝窝吃饭小助手</span>
                        <strong>今天吃什么？</strong>
                    </div>
                    <button class="wowo-static-action" type="button" onclick="window.wowoEnterFoodHelper()">
                        开始找吃的
                    </button>
                </div>
            </section>
        </div>
        <div id="app-root"></div>
        <script>
            window.__wowoStaticEntered = /[?&]wowo_enter=1(?:&|$)/.test(window.location.search);
            if (window.__wowoStaticEntered) {
                document.body.classList.add('wowo-app-entered');
            }
            window.wowoEnterFoodHelper = function () {
                window.__wowoStaticEntered = true;
                if (!window.location.hash || window.location.hash === '#/') {
                    window.location.hash = '/wowo-food';
                }
                document.body.classList.add('wowo-app-entered');
                window.dispatchEvent(new Event('wowo-static-enter'));
            };
        </script>
        <script type="module" src="/demo/main.tsx"></script>
    </body>
</html>
